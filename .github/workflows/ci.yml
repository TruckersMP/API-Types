name: CI

on:
  pull_request:
    paths:
      - '**.json'
      - '**.js'
      - '**.ts'
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  eslint:
    name: ESLint Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Node v24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint --ext .ts web/ traffic/
